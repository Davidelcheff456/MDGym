<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MDGym</title>
<meta name="description" content="MDGym: rutinas de gimnasio armadas segun tu equipamiento y objetivo, con registro de progreso." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%2318e07a'/%3E%3Cg fill='none' stroke='%230b0f0d' stroke-width='2.1' stroke-linecap='round'%3E%3Cpath d='M4 12h16M6 9v6M18 9v6'/%3E%3Crect x='3' y='9.5' width='2.2' height='5' rx='0.6' fill='%230b0f0d' stroke='none'/%3E%3Crect x='18.8' y='9.5' width='2.2' height='5' rx='0.6' fill='%230b0f0d' stroke='none'/%3E%3C/g%3E%3C/svg%3E" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div id="app">

  <!-- ===================== TOPBAR ===================== -->
  <div class="topbar">
    <div class="brand"><span id="topbar-logo"></span>MD<span class="dot">Gym</span></div>
    <button class="icon-btn" id="btn-settings" title="Configuracion" aria-label="Configuracion"><span id="topbar-gear-icon"></span></button>
  </div>
  <div class="topbar-welcome" id="topbar-welcome"></div>

  <!-- ===================== ONBOARDING ===================== -->
  <section class="view" id="view-onboarding">
    <div class="onboard-wrap" id="onboard-content"></div>
  </section>

  <!-- ===================== HOME (dia de hoy) ===================== -->
  <section class="view" id="view-home">
    <div id="home-content"></div>
  </section>

  <!-- ===================== MES (calendario + avance) ===================== -->
  <section class="view" id="view-month">
    <div id="month-content"></div>
  </section>

  <!-- ===================== HISTORIAL ===================== -->
  <section class="view" id="view-history">
    <div id="history-content"></div>
  </section>

  <!-- ===================== CONFIGURACION ===================== -->
  <section class="view" id="view-settings">
    <div id="settings-content"></div>
  </section>

  <!-- ===================== BOTTOM NAV ===================== -->
  <nav class="bottomnav" id="bottomnav">
    <button class="navbtn" data-nav="home"><span class="navicon" id="navicon-home"></span>Rutina</button>
    <button class="navbtn" data-nav="month"><span class="navicon" id="navicon-month"></span>Mes</button>
    <button class="navbtn" data-nav="history"><span class="navicon" id="navicon-history"></span>Historial</button>
  </nav>

</div>

<noscript>
  <div style="position:fixed;inset:0;background:#0a0e18;color:#fff;padding:24px;font:15px/1.5 -apple-system,sans-serif;z-index:99999;">
    MDGym necesita JavaScript habilitado en el navegador para funcionar. Activalo y volve a cargar la pagina.
  </div>
</noscript>

<script src="js/data-exercises.js"></script>
<script src="js/data-routines.js"></script>
<script src="js/data-attributions.js"></script>
<script src="js/ui-icons.js"></script>
<script src="js/storage.js"></script>
<script src="js/calc.js"></script>
<script src="js/app.js"></script>

<script>
  // ------------------------------------------------------------
  // Chequeo independiente de app.js: si por lo que sea alguno de
  // los scripts de arriba no se ejecuto (por ejemplo, el servidor
  // sirviendolos con un Content-Type incorrecto, algo que pasa en
  // algunas instalaciones de Windows), esta app quedaria "sin
  // hacer nada" sin ningun aviso. Este script es inline (no tiene
  // src), asi que no depende de que los otros hayan cargado bien,
  // y muestra un mensaje claro si detecta que la app nunca arranco.
  // ------------------------------------------------------------
  setTimeout(function () {
    var yaFunciona =
      typeof window.MDGymStore !== "undefined" &&
      typeof window.showView === "function" &&
      document.querySelector(".view.active");
    if (!yaFunciona) {
      var div = document.createElement("div");
      div.style.cssText =
        "position:fixed;inset:0;z-index:99999;background:#0a0e18;color:#fff;" +
        "padding:28px 22px;font:14px/1.6 -apple-system,BlinkMacSystemFont,sans-serif;overflow:auto;";
      div.innerHTML =
        "<h2 style='margin:0 0 12px;font-size:19px;'>MDGym no pudo iniciar</h2>" +
        "<p>La pagina cargo pero el codigo no se ejecuto. La causa mas comun: " +
        "el servidor que estas usando para ver el sitio esta enviando los archivos " +
        ".js con un tipo de contenido incorrecto, y el navegador se niega a " +
        "ejecutarlos por seguridad (esto pasa en algunas instalaciones de Windows).</p>" +
        "<p><b>Como solucionarlo:</b></p>" +
        "<ol style='padding-left:20px;'>" +
        "<li>Cerra este servidor si tenias uno abierto.</li>" +
        "<li>Hace doble clic en <b>iniciar.bat</b> (esta en esta misma carpeta) " +
        "en vez de abrir index.html directo, o en vez de otro servidor.</li>" +
        "</ol>" +
        "<p>Si el problema sigue, apreta F12, anda a la pestaña \"Console\" y " +
        "fijate si hay un mensaje en rojo que mencione \"MIME type\" o " +
        "\"Content-Type\" cerca de un archivo .js — eso confirma esta causa.</p>";
      document.body.appendChild(div);
    }
  }, 2500);
</script>
</body>
</html>
